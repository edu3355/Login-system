<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:,">
    <link rel="preload" href="css/style.css" as="style" onload="this.onload=null; this.rel='stylesheet'">
    <link rel="preload" href="js/script.js" as="script">

    <noscript>
	<link href="css/style.css" rel="style">
    </noscript>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Login System</h1>
            <p>FastAPI + Supabase</p>
        </div>

        <!-- 메시지 표시 영역 -->
        <div id="message" class="message hidden"></div>

        <!-- 로그인 폼 -->
        <div id="loginForm">
            <div class="form-group">
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter Password">
            </div>
            <button class="btn btn-primary" onclick="login()">Login</button>
            
            <div class="toggle-form">
                <button onclick="showSignupForm()"><strong>Sign up</strong></button>
            </div>
        </div>

        <!-- 회원가입 폼 -->
        <div id="signupForm" class="hidden">
            <div class="form-group">
                <label for="signupUsername">Username</label>
                <input type="text" id="signupUsername" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Enter Password">
            </div>
            <div class="form-group">
                <label for="signupPasswordVerify">Password Confirm</label>
                <input type="password" id="signupPasswordVerify" placeholder="Enter Password again">
            </div>
            <button class="btn btn-primary" onclick="signup()">Sign up</button>
            
            <div class="toggle-form">
                <button onclick="showLoginForm()"><strong>Login</strong></button>
            </div>
        </div>

        <!-- 로그인 후 사용자 정보 -->
        <div id="userSection" class="hidden">
            <div class="user-info">
                <h3>Logged in as <span id="userInfo"></span></h3>
            </div>
            <button class="btn btn-danger" onclick="showSignoutModal()">Sign out</button>
            <button class="btn btn-secondary" onclick="logout()">Log out</button>
        </div>

        <!-- 회원탈퇴 확인 모달 -->
        <div id="signoutModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Sign out Confirm</h3>
                    <button class="close-btn" onclick="hideSignoutModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to sign out?</p>
                    <p><strong>This action cannot be undone.</strong></p>
                    <div class="form-group">
                        <label for="signoutPassword">Password</label>
                        <input type="password" id="signoutPassword" placeholder="Enter your password">
                    </div>
                    <div id="signoutError" class="message error hidden"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="hideSignoutModal()">Cancel</button>
                    <button class="btn btn-danger" onclick="confirmSignout()">Sign out</button>
                </div>
            </div>
        </div>
    </div>

    <script href="js/script.js" defer><script>
</body>
</html>
